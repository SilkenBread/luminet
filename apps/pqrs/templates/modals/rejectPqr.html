<!-- Modal Rechazar/Anular PQR -->
<div id="rejectPqrModal" class="modal-overlay hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="modal-container bg-white rounded-xl shadow-2xl w-full max-w-md">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-red-600 to-red-700 rounded-t-xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <i data-lucide="x-circle" class="w-5 h-5 text-white"></i>
                </div>
                <h3 class="text-lg font-semibold text-white">Anular PQR</h3>
            </div>
            <button data-modal-close="rejectPqrModal" class="p-1.5 rounded-lg hover:bg-white/20 transition-colors">
                <i data-lucide="x" class="w-5 h-5 text-white"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 space-y-4">
            <p class="text-sm text-gray-600">
                Seleccione la causa de anulación para la PQR <strong id="rejectPqr_fileNumber"></strong>
            </p>
            
            <input type="hidden" id="rejectPqr_id" value="">

            <div>
                <label for="rejectPqr_cause" class="block text-sm font-medium text-gray-700 mb-1">Causa de anulación</label>
                <select id="rejectPqr_cause" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent text-sm">
                    <option value="">Seleccione una causa...</option>
                </select>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl flex justify-end gap-3">
            <button data-modal-close="rejectPqrModal"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                Cancelar
            </button>
            <button onclick="confirmRejectPqr()"
                    class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors">
                <i data-lucide="x-circle" class="w-4 h-4 inline mr-1"></i>
                Anular PQR
            </button>
        </div>
    </div>
</div>
