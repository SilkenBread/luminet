<!-- Modal Detalle PQR -->
<div id="reviewPqrModal" class="modal-overlay hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="modal-container bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-blue-600 to-blue-700 rounded-t-xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <i data-lucide="file-text" class="w-5 h-5 text-white"></i>
                </div>
                <h3 class="text-lg font-semibold text-white">Detalle PQR <span id="reviewPqr_fileNumber"></span></h3>
            </div>
            <button data-modal-close="reviewPqrModal" class="p-1.5 rounded-lg hover:bg-white/20 transition-colors">
                <i data-lucide="x" class="w-5 h-5 text-white"></i>
            </button>
        </div>

        <!-- Body (scrollable) -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Estado Badge -->
            <div class="flex items-center justify-between">
                <span id="reviewPqr_statusBadge" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"></span>
                <span id="reviewPqr_dateCreation" class="text-sm text-gray-500"></span>
            </div>

            <!-- Info del Reportante -->
            <div class="bg-gray-50 rounded-lg p-4">
                <h4 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">
                    <i data-lucide="user" class="w-4 h-4 inline mr-1"></i> Datos del Reportante
                </h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <p class="text-xs text-gray-500">Nombre</p>
                        <p id="reviewPqr_name" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Cédula</p>
                        <p id="reviewPqr_dni" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Teléfono</p>
                        <p id="reviewPqr_phone" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Correo</p>
                        <p id="reviewPqr_email" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                </div>
            </div>

            <!-- Info del Reporte -->
            <div class="bg-gray-50 rounded-lg p-4">
                <h4 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">
                    <i data-lucide="alert-triangle" class="w-4 h-4 inline mr-1"></i> Información del Reporte
                </h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <p class="text-xs text-gray-500">Tipo de Daño</p>
                        <p id="reviewPqr_typeDamage" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Origen</p>
                        <p id="reviewPqr_origin" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Nodo Reportado</p>
                        <p id="reviewPqr_node" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500">Ubicación</p>
                        <p id="reviewPqr_location" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                </div>
                <div class="mt-3">
                    <p class="text-xs text-gray-500">Observaciones</p>
                    <p id="reviewPqr_observation" class="text-sm text-gray-900 mt-1">-</p>
                </div>
            </div>

            <!-- Trazabilidad -->
            <div>
                <h4 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">
                    <i data-lucide="git-branch" class="w-4 h-4 inline mr-1"></i> Trazabilidad
                </h4>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">#</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Entrada</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Salida</th>
                            </tr>
                        </thead>
                        <tbody id="reviewPqr_routeHistory" class="divide-y divide-gray-200">
                            <tr><td colspan="4" class="px-4 py-3 text-center text-gray-400">Sin registros</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Órdenes Asociadas -->
            <div>
                <h4 class="text-sm font-semibold text-gray-700 uppercase tracking-wider mb-3">
                    <i data-lucide="clipboard-list" class="w-4 h-4 inline mr-1"></i> Órdenes de Trabajo
                </h4>
                <div id="reviewPqr_ordersContainer">
                    <p class="text-sm text-gray-400 text-center py-3">Sin órdenes asociadas</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl flex justify-end">
            <button data-modal-close="reviewPqrModal"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                Cerrar
            </button>
        </div>
    </div>
</div>
