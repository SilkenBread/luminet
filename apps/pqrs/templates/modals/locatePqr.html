<!-- Modal Ubicar PQR en Mapa -->
<div id="locatePqrModal" class="modal-overlay hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="modal-container bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-green-600 to-green-700 rounded-t-xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <i data-lucide="map-pin" class="w-5 h-5 text-white"></i>
                </div>
                <h3 class="text-lg font-semibold text-white">Ubicación del Reporte</h3>
            </div>
            <button data-modal-close="locatePqrModal" class="p-1.5 rounded-lg hover:bg-white/20 transition-colors">
                <i data-lucide="x" class="w-5 h-5 text-white"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 p-4">
            <div class="mb-3 flex items-center gap-2">
                <span class="text-sm text-gray-600">Nodo:</span>
                <span id="locatePqr_nodeInfo" class="text-sm font-semibold text-gray-900"></span>
            </div>
            <div id="locatePqrMap" class="w-full h-96 rounded-lg border border-gray-200"></div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl flex justify-end">
            <button data-modal-close="locatePqrModal"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                Cerrar
            </button>
        </div>
    </div>
</div>
