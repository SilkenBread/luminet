<!-- Panel deslizante: Infraestructura asociada al Nodo -->
<div id="nodeInfraPanel"
     class="hidden-panel fixed inset-y-0 right-0 z-40 w-full sm:max-w-md bg-white shadow-2xl flex flex-col border-l border-gray-200">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200 bg-gradient-to-r from-indigo-600 to-indigo-700">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                <i data-lucide="layers" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <h3 class="text-base font-semibold text-white">Infraestructura del Nodo</h3>
                <p id="nodeInfraPanel_nodeLabel" class="text-xs text-indigo-100">—</p>
            </div>
        </div>
        <button id="btnCloseInfraPanel" class="p-1.5 rounded-lg hover:bg-white/20 transition">
            <i data-lucide="x" class="w-5 h-5 text-white"></i>
        </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Skeleton loader (oculto por defecto, se muestra durante fetch) -->
        <div id="nodeInfraPanel_loader" class="hidden space-y-3">
            <div class="animate-pulse space-y-2">
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                <div class="h-16 bg-gray-200 rounded"></div>
            </div>
            <div class="animate-pulse space-y-2">
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                <div class="h-16 bg-gray-200 rounded"></div>
            </div>
        </div>

        <!-- Contenido dinámico inyectado por JS -->
        <div id="nodeInfraPanel_content" class="space-y-4"></div>

        <!-- Estado vacío -->
        <div id="nodeInfraPanel_empty" class="hidden text-center py-10 text-gray-500">
            <i data-lucide="package-x" class="w-12 h-12 mx-auto mb-2 text-gray-400"></i>
            <p class="text-sm">Este nodo no tiene infraestructura asociada.</p>
        </div>
    </div>

    <!-- Footer -->
    <div class="px-5 py-3 border-t border-gray-200 bg-gray-50 flex justify-end gap-2">
        <button id="btnCloseInfraPanel2"
                class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition">
            Cerrar
        </button>
    </div>
</div>
