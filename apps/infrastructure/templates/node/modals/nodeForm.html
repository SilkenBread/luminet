<!-- Modal Crear / Editar Nodo -->
<div id="nodeFormModal" class="modal-overlay hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="modal-container bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 bg-gradient-to-r from-blue-600 to-blue-700 rounded-t-xl">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <i data-lucide="map-pin" class="w-5 h-5 text-white"></i>
                </div>
                <h3 id="nodeFormTitle" class="text-lg font-semibold text-white">Crear Nodo</h3>
            </div>
            <button data-modal-close="nodeFormModal" class="p-1.5 rounded-lg hover:bg-white/20 transition">
                <i data-lucide="x" class="w-5 h-5 text-white"></i>
            </button>
        </div>

        <!-- Body -->
        <form id="nodeForm" class="flex-1 overflow-y-auto p-6 space-y-4" autocomplete="off">
            <input type="hidden" id="nodeForm_id">
            <input type="hidden" id="nodeForm_lat">
            <input type="hidden" id="nodeForm_lng">

            <!-- Estado de coordenadas -->
            <div id="nodeForm_coordsStatus"
                 class="rounded-lg p-3 text-sm border flex items-start gap-2">
                <i data-lucide="info" class="w-4 h-4 mt-0.5 flex-shrink-0"></i>
                <span id="nodeForm_coordsMsg">Haz click en el mapa para fijar la ubicación.</span>
            </div>

            <!-- Código pintado -->
            <div>
                <label for="nodeForm_paintingCode" class="block text-sm font-medium text-gray-700 mb-1">
                    Código pintado <span class="text-red-500">*</span>
                </label>
                <input id="nodeForm_paintingCode" type="text"
                       inputmode="numeric" pattern="[0-9]{7}"
                       maxlength="7" minlength="7" required
                       placeholder="0000000"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                <p class="mt-1 text-xs text-gray-500">7 dígitos numéricos.</p>
            </div>

            <!-- Observación -->
            <div>
                <label for="nodeForm_observation" class="block text-sm font-medium text-gray-700 mb-1">
                    Observaciones
                </label>
                <textarea id="nodeForm_observation" rows="3"
                          maxlength="300"
                          placeholder="Notas opcionales sobre el nodo..."
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"></textarea>
            </div>

            <!-- Info ubicación derivada (read-only, se llena tras crear/editar) -->
            <div id="nodeForm_locationInfo" class="hidden bg-gray-50 rounded-lg p-3 text-xs text-gray-600 space-y-1">
                <div><span class="font-medium">Comuna:</span> <span id="nodeForm_comuna">-</span></div>
                <div><span class="font-medium">Barrio:</span> <span id="nodeForm_district">-</span></div>
                <div class="font-mono"><span id="nodeForm_coords">-</span></div>
            </div>
        </form>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 rounded-b-xl flex justify-end gap-2">
            <button data-modal-close="nodeFormModal"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition">
                Cancelar
            </button>
            <button id="nodeFormSubmit" type="button"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition shadow-sm inline-flex items-center gap-2">
                <i data-lucide="save" class="w-4 h-4"></i>
                <span id="nodeFormSubmitText">Guardar</span>
            </button>
        </div>
    </div>
</div>
